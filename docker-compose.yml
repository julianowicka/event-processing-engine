services:
  api:
    build:
      context: .
    command: yarn start:dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      SQLITE_DB_PATH: /data/app.sqlite
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: FixedPollingInterval
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingFsWatchFile
      EVENT_WORKER_VERBOSE_LOGS: ${EVENT_WORKER_VERBOSE_LOGS:-false}
      EVENT_RETRY_DELAY_MS: "10000"
    ports:
      - '3100:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - '8080:80'
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
